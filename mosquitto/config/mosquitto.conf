persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# ---------- Internal MQTT (no TLS) ----------
# Only safe because docker-compose binds it to 127.0.0.1 on the VM
listener 1883
protocol mqtt
allow_anonymous true

# ---------- Public MQTT over TLS ----------
listener 8883
protocol mqtt

# TLS certs (mounted from host)
certfile /mosquitto/certs/fullchain.pem
keyfile /mosquitto/certs/privkey.pem

# AuthZ/AuthN
allow_anonymous false
password_file /mosquitto/passwd/pwfile
acl_file /mosquitto/acl/aclfile

